<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshot Manager</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e; 
        color: #eee; 
      }
      #root { height: 100%; }
      .fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        gap: 20px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="fallback">
        <h1>📸 截图管理器</h1>
        <p>正在加载...</p>
        <p style="color: #4ade80;">如果你一直看到这个页面，说明 JavaScript 没有执行</p>
      </div>
    </div>
    <script>
      console.log('内联脚本开始执行');
      document.querySelector('.fallback p').textContent = 'JavaScript 正在执行...';
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
